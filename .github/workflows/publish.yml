name: Publish to PyPI

on:
  push:
    tags:
      - "v*"   # trigger on v0.1.0, v1.2.3, etc.

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/patreon-dl/
    permissions:
      id-token: write   # required for OIDC trusted publishing
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Install Python
        run: uv python install 3.12

      - name: Run tests
        run: uv sync && uv run pytest -v

      - name: Build
        run: uv build

      - name: Publish to PyPI
        run: uv publish
